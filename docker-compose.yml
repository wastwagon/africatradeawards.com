# -----------------------------------------------------------------------------
# Minimal stack: Next.js only (no database or Redis in this file).
#
# For Coolify — app + PostgreSQL + Redis + worker in one project, use:
#   Docker Compose file:  docker-compose.coolify.yml
# See COOLIFY_FULLSTACK_SETUP.md and CONTRIBUTING.md.
# -----------------------------------------------------------------------------

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: africa-trade-awards
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3003
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3003/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
